<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Acceso · Radar Regulatorio</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="login-body">
    <main class="login-card">
        <h1>Radar Regulatorio</h1>
        <p class="muted">Introduce la contraseña para acceder.</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="flashes">
                    {% for category, msg in messages %}
                        <div class="flash flash-{{ category }}">{{ msg }}</div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        <form action="{{ url_for('auth.login') }}{% if request.args.get('next') %}?next={{ request.args.get('next') }}{% endif %}" method="post">
            <label for="password">Contraseña</label>
            <input type="password" id="password" name="password" required autofocus autocomplete="current-password">
            <button class="btn btn-primary" type="submit">Entrar</button>
        </form>
    </main>
</body>
</html>
