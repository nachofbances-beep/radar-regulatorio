# Blueprint de Render: define la web y la base de datos.
#
# El cron job diario está temporalmente desactivado porque el plan free de
# Render ya no soporta cron jobs (cambio de pricing). Mientras los correos
# diarios se "simulan" (sin Brevo configurado), no se pierde nada.
# Cuando quieras activar correos reales, añadiremos el cron diario gratis
# vía GitHub Actions (workflow .github/workflows/cron-diario.yml).

databases:
  - name: radar-db
    plan: free
    databaseName: radar
    user: radar

services:
  # ---------------------------- Web ---------------------------- #
  - type: web
    name: radar-regulatorio
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        fromDatabase:
          name: radar-db
          property: connectionString
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: APP_PASSWORD
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_SENDER_EMAIL
        sync: false
      - key: BREVO_SENDER_NAME
        value: Radar Regulatorio
      - key: RADAR_DISABLE_SCHEDULER
        value: "1"
      - key: INGEST_LOOKBACK_DAYS
        value: "95"
      - key: DISPLAY_WINDOW_DAYS
        value: "92"
